<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Cooltra Meteo Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='sky' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%234FC3F7'/%3E%3Cstop offset='100%25' style='stop-color:%230288D1'/%3E%3C/linearGradient%3E%3ClinearGradient id='cl' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23ECEFF1'/%3E%3Cstop offset='100%25' style='stop-color:%23B0BEC5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='url(%23sky)'/%3E%3Cellipse cx='16' cy='15' rx='9' ry='5.5' fill='url(%23cl)'/%3E%3Ccircle cx='11' cy='15' r='4.5' fill='url(%23cl)'/%3E%3Ccircle cx='19' cy='13.5' r='5' fill='url(%23cl)'/%3E%3Cline x1='11' y1='22' x2='9.5' y2='26.5' stroke='%2329B6F6' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='16' y1='22' x2='14.5' y2='26.5' stroke='%2329B6F6' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='21' y1='22' x2='19.5' y2='26.5' stroke='%2329B6F6' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #222; font-size: 13px; display: flex; flex-direction: column; }
    header, .controls { flex: 0 0 auto; }
    .main { flex: 1 1 auto; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
    .card { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }

    /* HEADER */
    header {
      background: #111827;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    header .sub { font-size: 11px; opacity: 0.55; margin-top: 2px; }

    /* CONTROLS */
    .controls {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .toggle-group { display: flex; gap: 0; border: 1.5px solid #d1d5db; border-radius: 8px; overflow: hidden; }
    .toggle-group button {
      padding: 5px 14px;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      transition: background 0.15s;
      border-right: 1.5px solid #d1d5db;
    }
    .toggle-group button:last-child { border-right: none; }
    .toggle-group button.active { background: #111827; color: white; }
    .toggle-group button:hover:not(.active) { background: #f9fafb; }

    .legend { display: flex; gap: 10px; align-items: center; margin-left: auto; flex-wrap: wrap; }
    .legend-label { font-size: 11px; font-weight: 600; color: #6b7280; }
    .l-item { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #374151; }
    .l-dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

    /* MAIN */
    .main { padding: 16px 24px; }

    /* LOADING */
    .loading-wrap { text-align: center; padding: 60px 20px; color: #6b7280; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #111827;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TABLE CARD */
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    .table-scroll { overflow: auto; flex: 1 1 auto; min-height: 0; max-height: calc(100vh - 130px); }

    table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
    th, td { padding: 0; border-right: 1px solid #f3f4f6; border-bottom: 1px solid #f3f4f6; }

    /* Sticky columns */
    .col-city {
      position: sticky; left: 0; z-index: 3;
      min-width: 115px; max-width: 115px;
      background: white;
      padding: 5px 10px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      color: #111827;
      border-right: 2px solid #e5e7eb;
    }
    .col-city:hover { color: #2563eb; text-decoration: underline; }
    thead .col-city { cursor: default; color: #fff; background: #111827 !important; top: 0; z-index: 5; }
    thead .col-city:hover { text-decoration: none; color: #fff; }

    /* Sticky header row */
    thead { position: sticky !important; top: 0 !important; z-index: 10 !important; }
    thead tr { position: sticky !important; top: 0 !important; z-index: 10 !important; }
    thead th { position: sticky !important; top: 0 !important; z-index: 10 !important; background: #ffffff; }
    thead th.col-city { z-index: 12 !important; }
    thead th.col-date.is-past { background: #f9fafb !important; }
    thead th.col-date.is-today { background: #fef9c3 !important; }
    thead th.col-date.is-future { background: #eff6ff !important; }
    thead th.col-date.is-lastyear { background: #f3f4f6 !important; }

    /* Date header cells */
    .col-date {
      min-width: 42px; max-width: 42px;
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      color: #374151;
      padding: 4px 2px;
      line-height: 1.3;
    }
    .col-date.is-past   { background: #f9fafb; }
    .col-date.is-today  { background: #fef9c3; font-weight: 700; color: #92400e; }
    .col-date.is-future { background: #eff6ff; color: #1d4ed8; }
    .col-date.is-lastyear { background: #f3f4f6; color: #6b7280; font-size: 9px; }

    /* Group header row */
    .group-row td {
      background: #1f2937;
      color: #d1d5db;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      position: sticky;
      left: 0;
    }

    /* Data cells */
    .dcell {
      text-align: center;
      min-width: 42px; max-width: 42px;
      padding: 3px 2px;
      cursor: default;
      position: relative;
      vertical-align: middle;
    }
    .dcell .t { font-size: 11px; font-weight: 700; line-height: 1.3; }
    .dcell .r { font-size: 9px; line-height: 1.3; opacity: 0.88; }

    /* Year comparison sub-row */
    .subrow td.col-city {
      font-size: 10px;
      color: #9ca3af;
      padding-left: 18px;
      font-weight: 500;
      background: #fafafa;
    }
    .subrow .dcell .t { font-size: 10px; }
    .subrow .dcell .r { font-size: 9px; }

    /* Today column highlight */
    td.is-today-col { outline: 2px solid rgba(234,179,8,0.5); outline-offset: -2px; }

    /* DETAIL PANEL */
    .detail-panel {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
      padding: 20px 24px;
      margin-top: 16px;
      display: none;
    }
    .detail-panel.open { display: block; }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }
    .detail-header h2 { font-size: 20px; font-weight: 700; }
    .detail-header .dsub { font-size: 12px; color: #6b7280; margin-top: 3px; }
    .close-btn {
      background: none; border: none; cursor: pointer;
      font-size: 22px; color: #9ca3af; line-height: 1;
      padding: 0 4px;
    }
    .close-btn:hover { color: #374151; }

    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-block { }
    .chart-title {
      font-size: 11px; font-weight: 700; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .chart-title span {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      margin-left: 6px;
    }
    .badge-2026 { background: #dbeafe; color: #1d4ed8; }
    .badge-2025 { background: #f3f4f6; color: #6b7280; }
    .chart-wrap { position: relative; height: 200px; }

    /* Tooltip */
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(17,24,39,0.92);
      color: white;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 10px;
      white-space: nowrap;
      z-index: 200;
      pointer-events: none;
    }

    .error-box { background: #fef2f2; color: #b91c1c; padding: 14px 18px; border-radius: 8px; margin: 12px 0; font-size: 13px; }
    .no-data { color: #d1d5db; font-size: 10px; }

    .period-info { font-size: 11px; color: #6b7280; margin-bottom: 10px; }
    .period-info strong { color: #374151; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🌦 Cooltra Meteo Dashboard</h1>
    <div class="sub">Pluja · Temperatura · 18 ciutats</div>
  </div>
  <div id="headerDates" style="font-size:11px; opacity:0.6; text-align:right;"></div>
</header>

<div class="controls">
  <div class="toggle-group">
    <button id="btn2026" class="active" onclick="setMode(2026)">Any actual (2026)</button>
    <button id="btn2025" onclick="setMode(2025)">Any passat (2025)</button>
    <button id="btnBoth" onclick="setMode('both')">Comparació</button>
  </div>
  <div class="legend">
    <span class="legend-label">Pluja:</span>
    <div class="l-item"><div class="l-dot" style="background:#f3f4f6;border:1px solid #d1d5db;"></div> Sec</div>
    <div class="l-item"><div class="l-dot" style="background:#bfdbfe;"></div> &lt;3mm</div>
    <div class="l-item"><div class="l-dot" style="background:#60a5fa;"></div> 3–8mm</div>
    <div class="l-item"><div class="l-dot" style="background:#1d4ed8;"></div> 8–20mm</div>
    <div class="l-item"><div class="l-dot" style="background:#1e1b4b;"></div> &gt;20mm</div>
  </div>
</div>

<div class="main">
  <div id="loadingWrap" class="loading-wrap">
    <span class="spinner"></span>
    <span id="loadingText">Connectant a Open Meteo...</span>
  </div>
  <div id="errorBox" class="error-box" style="display:none;"></div>
  <div id="tableCard" class="card" style="display:none;">
    <div class="table-scroll">
      <table id="mainTable"></table>
    </div>
  </div>
  <div id="detailPanel" class="detail-panel">
    <div class="detail-header">
      <div>
        <h2 id="dCityName">—</h2>
        <div class="dsub" id="dSub"></div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="charts-grid">
      <div class="chart-block">
        <div class="chart-title">Temperatura °C <span class="badge-2026">2026</span></div>
        <div class="chart-wrap"><canvas id="cTemp2026"></canvas></div>
      </div>
      <div class="chart-block">
        <div class="chart-title">Pluja mm <span class="badge-2026">2026</span></div>
        <div class="chart-wrap"><canvas id="cRain2026"></canvas></div>
      </div>
      <div class="chart-block">
        <div class="chart-title">Temperatura °C <span class="badge-2025">2025</span></div>
        <div class="chart-wrap"><canvas id="cTemp2025"></canvas></div>
      </div>
      <div class="chart-block">
        <div class="chart-title">Pluja mm <span class="badge-2025">2025</span></div>
        <div class="chart-wrap"><canvas id="cRain2025"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const TODAY_STR = (() => {
  const d = new Date();
  return d.toISOString().split('T')[0];
})();

const CITIES = [
  { name:'Barcelona', lat:41.3851, lon:2.1734,   country:'ES' },
  { name:'Madrid',    lat:40.4168, lon:-3.7038,   country:'ES' },
  { name:'Valencia',  lat:39.4699, lon:-0.3763,   country:'ES' },
  { name:'Sevilla',   lat:37.3891, lon:-5.9845,   country:'ES' },
  { name:'Lisboa',    lat:38.7223, lon:-9.1393,   country:'PT' },
  { name:'Paris',     lat:48.8566, lon:2.3522,    country:'FR' },
  { name:'Torino',    lat:45.0703, lon:7.6869,    country:'IT' },
  { name:'Milano',    lat:45.4654, lon:9.1859,    country:'IT' },
  { name:'Roma',      lat:41.9028, lon:12.4964,   country:'IT' },
  { name:'Amsterdam', lat:52.3676, lon:4.9041,    country:'NL' },
  { name:'Rotterdam', lat:51.9244, lon:4.4777,    country:'NL' },
  { name:'Haarlem',   lat:52.3874, lon:4.6462,    country:'NL' },
  { name:'Den Haag',  lat:52.0705, lon:4.3007,    country:'NL' },
  { name:'Delft',     lat:52.0116, lon:4.3571,    country:'NL' },
  { name:'Nijmegen',  lat:51.8426, lon:5.8546,    country:'NL' },
  { name:'Eindhoven', lat:51.4416, lon:5.4697,    country:'NL' },
  { name:'Bruxelles', lat:50.8503, lon:4.3517,    country:'BE' },
  { name:'Antwerp',   lat:51.2194, lon:4.4025,    country:'BE' },
];

const FLAGS   = { ES:'🇪🇸', PT:'🇵🇹', FR:'🇫🇷', IT:'🇮🇹', NL:'🇳🇱', BE:'🇧🇪' };
const CNAMES  = { ES:'Espanya', PT:'Portugal', FR:'França', IT:'Itàlia', NL:'Països Baixos', BE:'Bèlgica' };
const COUNTRY_ORDER = ['ES','PT','FR','IT','NL','BE'];

// ============================================================
// DATE HELPERS
// ============================================================
function addDays(str, n) {
  const d = new Date(str + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().split('T')[0];
}

function shiftYear(str, delta) {
  return str.replace(/^(\d{4})/, y => String(parseInt(y) + delta));
}

function genRange(start, end) {
  const out = [];
  let cur = start;
  while (cur <= end) { out.push(cur); cur = addDays(cur, 1); }
  return out;
}

function fmtDateHeader(str) {
  const d = new Date(str + 'T12:00:00Z');
  const DD = ['Dg','Dl','Dm','Dc','Dj','Dv','Ds'][d.getUTCDay()];
  const M  = ['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'][d.getUTCMonth()];
  return `${DD}\n${d.getUTCDate()} ${M}`;
}

function fmtDateShort(str) {
  const d = new Date(str + 'T12:00:00Z');
  return `${d.getUTCDate()}/${d.getUTCMonth()+1}`;
}

// Current period: 16 past days + today + 7 future
const DATE_START_CUR  = addDays(TODAY_STR, -16);
const DATE_END_CUR    = addDays(TODAY_STR, 7);
const DATES_CUR       = genRange(DATE_START_CUR, DATE_END_CUR);  // 24 dates

// Last year same period
const DATE_START_LY   = shiftYear(DATE_START_CUR, -1);
const DATE_END_LY     = shiftYear(DATE_END_CUR,   -1);
const DATES_LY        = genRange(DATE_START_LY,  DATE_END_LY);

// Show in header
document.getElementById('headerDates').innerHTML =
  `<div>Actual: ${DATE_START_CUR} → ${DATE_END_CUR}</div>` +
  `<div>Passat: ${DATE_START_LY} → ${DATE_END_LY}</div>`;

// ============================================================
// FETCH
// ============================================================
const DB = {};  // DB[cityName] = { cur: apiData, ly: apiData }

async function fetchForecast(city) {
  const url = `https://api.open-meteo.com/v1/forecast` +
    `?latitude=${city.lat}&longitude=${city.lon}` +
    `&daily=precipitation_sum,temperature_2m_max,temperature_2m_min` +
    `&past_days=16&forecast_days=8&timezone=auto`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function fetchArchive(city, start, end) {
  const url = `https://archive-api.open-meteo.com/v1/archive` +
    `?latitude=${city.lat}&longitude=${city.lon}` +
    `&daily=precipitation_sum,temperature_2m_max,temperature_2m_min` +
    `&start_date=${start}&end_date=${end}&timezone=auto`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadAll() {
  const loadText = document.getElementById('loadingText');
  let done = 0;

  const BATCH = 3;
  for (let i = 0; i < CITIES.length; i += BATCH) {
    const slice = CITIES.slice(i, i + BATCH);
    await Promise.all(slice.map(async city => {
      try {
        const [cur, ly] = await Promise.all([
          fetchForecast(city),
          fetchArchive(city, DATE_START_LY, DATE_END_LY)
        ]);
        DB[city.name] = { cur, ly };
      } catch(e) {
        console.warn('Error:', city.name, e.message);
        DB[city.name] = { cur: null, ly: null };
      }
      done++;
      loadText.textContent = `Carregant... ${done}/${CITIES.length} ciutats`;
    }));
  }

  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('tableCard').style.display = 'block';
  buildTable();
}

// ============================================================
// EXTRACT DAY DATA
// ============================================================
function getDay(cityName, dateStr, isLastYear) {
  const rec = DB[cityName];
  if (!rec) return null;
  const src = isLastYear ? rec.ly : rec.cur;
  if (!src || !src.daily) return null;

  const lookup = isLastYear ? shiftYear(dateStr, -1) : dateStr;
  const idx = src.daily.time.indexOf(lookup);
  if (idx < 0) return null;

  return {
    rain:    src.daily.precipitation_sum?.[idx] ?? null,
    tmax:    src.daily.temperature_2m_max?.[idx] ?? null,
    tmin:    src.daily.temperature_2m_min?.[idx] ?? null,
  };
}

// ============================================================
// COLORS
// ============================================================
function rainBg(mm) {
  if (mm === null || mm < 0.1) return '#f9fafb';
  if (mm < 1)   return '#eff6ff';
  if (mm < 3)   return '#bfdbfe';
  if (mm < 8)   return '#60a5fa';
  if (mm < 20)  return '#1d4ed8';
  return '#1e1b4b';
}

function rainFg(mm) {
  if (mm === null || mm < 3) return '#1f2937';
  return '#ffffff';
}

function tempFg(t) {
  if (t === null) return '#9ca3af';
  if (t < 5)  return '#1d4ed8';
  if (t < 12) return '#0891b2';
  if (t < 20) return '#16a34a';
  if (t < 28) return '#d97706';
  return '#dc2626';
}

// ============================================================
// BUILD TABLE
// ============================================================
let currentMode = 2026;

function setMode(m) {
  currentMode = m;
  ['btn2026','btn2025','btnBoth'].forEach(id => document.getElementById(id).classList.remove('active'));
  if (m === 2026)   document.getElementById('btn2026').classList.add('active');
  if (m === 2025)   document.getElementById('btn2025').classList.add('active');
  if (m === 'both') document.getElementById('btnBoth').classList.add('active');
  buildTable();
}

function buildTable() {
  const useLY   = currentMode === 2025;
  const showBoth = currentMode === 'both';

  let html = '<thead><tr>';
  html += `<th class="col-city" style="background:#111827;color:#fff;font-weight:700;">Ciutat</th>`;

  for (const dt of DATES_CUR) {
    const isPast   = dt < TODAY_STR;
    const isToday  = dt === TODAY_STR;
    const isFuture = dt > TODAY_STR;
    let cls = isPast ? 'is-past' : isToday ? 'is-today' : 'is-future';
    const parts = fmtDateHeader(dt).split('\n');
    const todayDot = isToday ? '<br>●' : '';
    html += `<th class="col-date ${cls}">${parts[0]}<br>${parts[1]}${todayDot}</th>`;
  }

  if (showBoth) {
    html += `<th class="col-date is-lastyear" style="min-width:8px;max-width:8px;"></th>`;
    for (const dt of DATES_CUR) {
      const parts = fmtDateHeader(shiftYear(dt, -1)).split('\n');
      html += `<th class="col-date is-lastyear">${parts[0]}<br>${parts[1]}<br>25</th>`;
    }
  }

  html += '</tr></thead><tbody>';

  for (const country of COUNTRY_ORDER) {
    const citiesC = CITIES.filter(c => c.country === country);
    if (!citiesC.length) continue;
    const colspan = showBoth ? (DATES_CUR.length * 2 + 2) : (DATES_CUR.length + 1);
    html += `<tr class="group-row"><td colspan="${colspan}">${FLAGS[country]} ${CNAMES[country]}</td></tr>`;

    for (const city of citiesC) {
      // Main row
      html += `<tr>`;
      html += `<td class="col-city" onclick="showDetail('${city.name}')" title="Veure gràfics detallats">${city.name}</td>`;

      for (const dt of DATES_CUR) {
        const isToday = dt === TODAY_STR;
        const d = getDay(city.name, dt, useLY);
        if (!d) {
          html += `<td class="dcell${isToday?' is-today-col':''}"><span class="no-data">—</span></td>`;
        } else {
          const bg  = rainBg(d.rain);
          const fg  = rainFg(d.rain);
          const tc  = tempFg(d.tmax);
          const rStr = d.rain !== null ? (d.rain < 0.1 ? '0' : d.rain.toFixed(1)) : '—';
          const tStr = d.tmax !== null ? Math.round(d.tmax) + '°' : '—';
          const tip  = `data-tip="Màx:${d.tmax!==null?d.tmax.toFixed(1):'—'}° | Mín:${d.tmin!==null?d.tmin.toFixed(1):'—'}° | Pluja:${rStr}mm"`;
          html += `<td class="dcell${isToday?' is-today-col':''}" style="background:${bg};color:${fg};" ${tip}>` +
            `<div class="t" style="color:${tc};">${tStr}</div>` +
            `<div class="r">${rStr}mm</div>` +
            `</td>`;
        }
      }

      if (showBoth) {
        html += `<td style="width:6px;background:#e5e7eb;"></td>`;
        for (const dt of DATES_CUR) {
          const d = getDay(city.name, dt, true);
          if (!d) {
            html += `<td class="dcell" style="background:#f9fafb;"><span class="no-data">—</span></td>`;
          } else {
            const bg  = rainBg(d.rain);
            const fg  = rainFg(d.rain);
            const tc  = tempFg(d.tmax);
            const rStr = d.rain !== null ? (d.rain < 0.1 ? '0' : d.rain.toFixed(1)) : '—';
            const tStr = d.tmax !== null ? Math.round(d.tmax) + '°' : '—';
            const tip  = `data-tip="2025 · Màx:${d.tmax!==null?d.tmax.toFixed(1):'—'}° | Pluja:${rStr}mm"`;
            html += `<td class="dcell" style="background:${bg};color:${fg};opacity:0.85;" ${tip}>` +
              `<div class="t" style="color:${tc};font-size:10px;">${tStr}</div>` +
              `<div class="r" style="font-size:9px;">${rStr}mm</div>` +
              `</td>`;
          }
        }
      }

      html += `</tr>`;
    }
  }

  html += '</tbody>';
  document.getElementById('mainTable').innerHTML = html;
}

// ============================================================
// DETAIL CHARTS
// ============================================================
const chartInstances = {};

function destroyCharts() {
  ['cTemp2026','cRain2026','cTemp2025','cRain2025'].forEach(id => {
    if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  });
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  destroyCharts();
}

function showDetail(cityName) {
  const panel = document.getElementById('detailPanel');
  document.getElementById('dCityName').textContent = cityName;
  document.getElementById('dSub').textContent =
    `${DATE_START_CUR} → ${DATE_END_CUR} (actual) · ${DATE_START_LY} → ${DATE_END_LY} (any passat)`;
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  destroyCharts();

  const rec = DB[cityName];
  if (!rec) return;

  // Labels
  const lblCur = DATES_CUR.map(fmtDateShort);
  const lblLY  = DATES_LY.map(fmtDateShort);

  // Extract series
  function series(src, dates, key) {
    if (!src || !src.daily) return dates.map(() => null);
    return dates.map(dt => {
      const i = src.daily.time.indexOf(dt);
      return i >= 0 ? (src.daily[key]?.[i] ?? null) : null;
    });
  }

  const tmax26 = series(rec.cur, DATES_CUR, 'temperature_2m_max');
  const tmin26 = series(rec.cur, DATES_CUR, 'temperature_2m_min');
  const rain26 = series(rec.cur, DATES_CUR, 'precipitation_sum');
  const tmax25 = series(rec.ly,  DATES_LY,  'temperature_2m_max');
  const tmin25 = series(rec.ly,  DATES_LY,  'temperature_2m_min');
  const rain25 = series(rec.ly,  DATES_LY,  'precipitation_sum');

  // Today index (for vertical line via point styling)
  const todayIdx = DATES_CUR.indexOf(TODAY_STR);

  // Point radii: bigger for today
  const pRadius = DATES_CUR.map((_, i) => i === todayIdx ? 5 : 2);

  const baseLineOpts = {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    scales: {
      x: { ticks: { font: { size: 9 }, maxRotation: 50 } },
      y: { ticks: { font: { size: 10 } }, title: { display: true, text: '°C', font: { size: 10 } } }
    },
    plugins: { legend: { labels: { font: { size: 10 }, boxWidth: 12, padding: 8 } } }
  };

  const baseBarOpts = {
    responsive: true, maintainAspectRatio: false,
    scales: {
      x: { ticks: { font: { size: 9 }, maxRotation: 50 } },
      y: { min: 0, ticks: { font: { size: 10 } }, title: { display: true, text: 'mm', font: { size: 10 } } }
    },
    plugins: { legend: { display: false } }
  };

  chartInstances['cTemp2026'] = new Chart(document.getElementById('cTemp2026'), {
    type: 'line',
    data: {
      labels: lblCur,
      datasets: [
        { label: 'Màx', data: tmax26, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)', tension: 0.35, pointRadius: pRadius, fill: false },
        { label: 'Mín', data: tmin26, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.08)', tension: 0.35, pointRadius: pRadius, fill: '-1' },
      ]
    },
    options: baseLineOpts
  });

  chartInstances['cRain2026'] = new Chart(document.getElementById('cRain2026'), {
    type: 'bar',
    data: {
      labels: lblCur,
      datasets: [{
        label: 'Pluja mm',
        data: rain26,
        backgroundColor: rain26.map(v => v > 8 ? '#1d4ed8' : v > 1 ? '#60a5fa' : '#bfdbfe'),
        borderRadius: 3,
      }]
    },
    options: baseBarOpts
  });

  chartInstances['cTemp2025'] = new Chart(document.getElementById('cTemp2025'), {
    type: 'line',
    data: {
      labels: lblLY,
      datasets: [
        { label: 'Màx', data: tmax25, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)', tension: 0.35, pointRadius: 2, fill: false },
        { label: 'Mín', data: tmin25, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.08)', tension: 0.35, pointRadius: 2, fill: '-1' },
      ]
    },
    options: baseLineOpts
  });

  chartInstances['cRain2025'] = new Chart(document.getElementById('cRain2025'), {
    type: 'bar',
    data: {
      labels: lblLY,
      datasets: [{
        label: 'Pluja mm',
        data: rain25,
        backgroundColor: rain25.map(v => v > 8 ? '#1d4ed8' : v > 1 ? '#60a5fa' : '#bfdbfe'),
        borderRadius: 3,
      }]
    },
    options: baseBarOpts
  });
}
