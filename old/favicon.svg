<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloud" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECEFF1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B0BEC5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#sky)"/>
  <!-- Cloud body -->
  <ellipse cx="16" cy="15" rx="9" ry="5.5" fill="url(#cloud)"/>
  <circle cx="11" cy="15" r="4.5" fill="url(#cloud)"/>
  <circle cx="19" cy="13.5" r="5" fill="url(#cloud)"/>
  <!-- Rain drops -->
  <line x1="11" y1="22" x2="9.5" y2="26.5" stroke="#29B6F6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="14.5" y2="26.5" stroke="#29B6F6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="22" x2="19.5" y2="26.5" stroke="#29B6F6" stroke-width="1.8" stroke-linecap="round"/>
</svg>
